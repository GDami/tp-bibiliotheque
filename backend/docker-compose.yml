name: bibili

services:
  mysql:
    image: mysql:8.0.45
    container_name: bibili-mysql

    networks:
      - bibili

    environment:
      MYSQL_DATABASE: bibili
      MYSQL_ROOT_PASSWORD: root

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 3s
      retries: 10
      interval: 5s

  java:
    image: bibili-backend

    networks:
      - bibili

    ports:
      - 8081:8080

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bibili
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

    depends_on:
      mysql:
        condition: service_healthy

networks:
  bibili:
    name: bibili
